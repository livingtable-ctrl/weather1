[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
    "integration: integration tests — live API tests require KALSHI_ENV=demo; cron integration tests use only mocks and are CI-safe (run with '-m integration')",
]

[tool.coverage.run]
omit = [
    "paper.py",
    "backtest.py",
    "param_sweep.py",
    "feature_importance.py",
    "pdf_report.py",
    "tests/*",
]

[tool.coverage.report]
exclude_lines = [
    "if __name__ == .__main__.",
    "pragma: no cover",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes (unused imports, undefined names, etc.)
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade (modernize syntax)
]
ignore = [
    "E501",  # line too long — handled by formatter
]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
implicit_optional = true
warn_unused_ignores = false
warn_return_any = false
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "kalshi_client"
ignore_errors = true

[[tool.mypy.overrides]]
module = "tests.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "pdf_report"
ignore_errors = true
