name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest pytest-cov responses types-requests types-tabulate

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy . --ignore-missing-imports --implicit-optional --no-error-summary

      - name: Run tests with coverage
        run: pytest -v --cov=. --cov-report=term-missing

      - name: Fail if coverage drops below 40%
        run: pytest --cov=. --cov-fail-under=40 -q
