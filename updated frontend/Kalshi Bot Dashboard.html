<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kalshi Weather Bot — Dashboard Explorations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="mock-data.js"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="variation-terminal.jsx"></script>
  <script type="text/babel" src="variation-calm.jsx"></script>
  <script type="text/babel" src="variation-editorial.jsx"></script>
  <script type="text/babel" src="variation-hybrid.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react">
    const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;

    function Frame({ children, scale = 1 }) {
      // The artboard cards are designed at desktop widths but rendered
      // smaller in the canvas — wrap the variation in a fixed-size box and
      // scale it down with transform so the design composes correctly.
      const baseW = 1440, baseH = 900;
      return (
        <div style={{ width: baseW * scale, height: baseH * scale, position: 'relative', overflow: 'hidden', background: '#fff' }}>
          <div style={{
            width: baseW, height: baseH, transform: `scale(${scale})`, transformOrigin: 'top left',
          }}>
            {children}
          </div>
        </div>
      );
    }

    const SCALE = 0.5;
    const W = 1440 * SCALE, H = 900 * SCALE;

    function App() {
      return (
        <DesignCanvas
          title="Kalshi Weather Bot — Operator Dashboard"
          subtitle="Three visual directions, side by side. Pick one and I'll wire it up as the interactive prototype."
        >
          <DCSection
            id="overview"
            title="Four directions"
            subtitle="Same data, four personalities. Hover any artboard to expand — top-right ⤢ opens it fullscreen."
          >
            <DCArtboard id="terminal" label="A · Terminal density" width={W} height={H}>
              <Frame scale={SCALE}>
                <window.TermVar.App />
              </Frame>
            </DCArtboard>

            <DCArtboard id="calm" label="B · Modern fintech calm" width={W} height={H}>
              <Frame scale={SCALE}>
                <window.CalmVar.App />
              </Frame>
            </DCArtboard>

            <DCArtboard id="editorial" label="C · Editorial / data-journalism" width={W} height={H}>
              <Frame scale={SCALE}>
                <window.EditVar.App />
              </Frame>
            </DCArtboard>

            <DCArtboard id="hybrid" label="D · Hybrid (B + C)" width={W} height={H}>
              <Frame scale={SCALE}>
                <window.HybridVar.App />
              </Frame>
            </DCArtboard>
          </DCSection>

          <DCSection
            id="prototype"
            title="Interactive multi-tab prototype"
            subtitle="Full dashboard with Overview, Positions, Signals, Analytics, Risk, Calibration tabs. Click ⤢ for fullscreen."
          >
            <DCArtboard id="proto-full" label="Full dashboard · 6 tabs" width={1280} height={780}>
              <iframe src="full-prototype.html" style={{ width: '100%', height: '100%', border: 'none', display: 'block' }} />
            </DCArtboard>
            <DCArtboard id="proto-tweaks" label="Single-screen with Tweaks" width={1280} height={780}>
              <iframe src="prototype.html" style={{ width: '100%', height: '100%', border: 'none', display: 'block' }} />
            </DCArtboard>
          </DCSection>

          <DCPostIt x={40} y={40}>
            Four directions for your operator dashboard.

            A. Terminal — max density, mono (too busy per user).
            B. Calm — generous space, soft surfaces.
            C. Editorial — charts as the hero, serif headlines.
            D. Hybrid — B's clean layout + C's data storytelling.

            Tell me which to push further (or keep exploring).
          </DCPostIt>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
